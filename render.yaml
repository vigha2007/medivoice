services:
  - type: web
    name: medivoice-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://medivoice-frontend.onrender.com
      - key: DATABASE_URL
        sync: false

  - type: web
    name: medivoice-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://medivoice-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
